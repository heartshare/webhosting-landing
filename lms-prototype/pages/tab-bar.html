<!-- iOS Tab Bar Component -->
<div id="ios-tab-bar" class="fixed bottom-0 left-0 right-0 h-[83px] bg-white/95 backdrop-blur-sm border-t border-gray-200 z-50 pb-8">
    <div class="flex items-center justify-around h-full px-4">
        <!-- Home Tab -->
        <button onclick="navigateTo('home')" id="tab-home" class="tab-btn flex flex-col items-center gap-1 px-4 py-2 transition-all duration-200 cursor-pointer group">
            <div class="w-6 h-6 flex items-center justify-center transition-all duration-200 group-hover:scale-110">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium transition-colors duration-200">Home</span>
        </button>

        <!-- Courses Tab -->
        <button onclick="navigateTo('courses')" id="tab-courses" class="tab-btn flex flex-col items-center gap-1 px-4 py-2 transition-all duration-200 cursor-pointer group">
            <div class="w-6 h-6 flex items-center justify-center transition-all duration-200 group-hover:scale-110">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium transition-colors duration-200">Courses</span>
        </button>

        <!-- My Learning Tab -->
        <button onclick="navigateTo('my-learning')" id="tab-my-learning" class="tab-btn flex flex-col items-center gap-1 px-4 py-2 transition-all duration-200 cursor-pointer group">
            <div class="w-6 h-6 flex items-center justify-center transition-all duration-200 group-hover:scale-110">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium transition-colors duration-200">Learning</span>
        </button>

        <!-- Profile Tab -->
        <button onclick="navigateTo('profile')" id="tab-profile" class="tab-btn flex flex-col items-center gap-1 px-4 py-2 transition-all duration-200 cursor-pointer group">
            <div class="w-6 h-6 flex items-center justify-center transition-all duration-200 group-hover:scale-110">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium transition-colors duration-200">Profile</span>
        </button>
    </div>
</div>

<style>
    .tab-btn svg {
        stroke: #9CA3AF;
        transition: stroke 0.2s;
    }
    .tab-btn.active svg {
        stroke: #4F46E5;
    }
    .tab-btn span {
        color: #9CA3AF;
    }
    .tab-btn.active span {
        color: #4F46E5;
    }
</style>

<script>
    let currentPage = 'home';

    function navigateTo(page) {
        // Remove active class from all tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        // Add active class to current tab
        const currentTab = document.getElementById(`tab-${page}`);
        if (currentTab) {
            currentTab.classList.add('active');
        }

        // Store current page
        currentPage = page;

        // Navigate to the new page
        window.location.href = `${page}.html`;
    }

    // Set active tab on page load
    document.addEventListener('DOMContentLoaded', () => {
        const path = window.location.pathname;
        const page = path.split('/').pop().replace('.html', '');

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        const activeTab = document.getElementById(`tab-${page}`);
        if (activeTab) {
            activeTab.classList.add('active');
        }
    });
</script>
