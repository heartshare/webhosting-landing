<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EduFlow</title>
  <meta name="description" content="Sign in to your EduFlow account to continue learning.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            primary: '#6366F1',
            'primary-dark': '#4F46E5',
            secondary: '#818CF8',
            cta: '#10B981',
            'cta-dark': '#059669',
            background: '#F5F3FF',
            'text-dark': '#1E1B4B',
          }
        }
      }
    }
  </script>
  
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="bg-background text-text-dark min-h-screen flex flex-col">
  
  <!-- Navbar -->
  <nav class="fixed top-4 left-4 right-4 z-50">
    <div class="glass rounded-2xl shadow-lg px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-primary to-cta rounded-lg flex items-center justify-center">
          <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
        </div>
        <span class="font-bold text-xl">EduFlow</span>
      </div>
      
      <div class="hidden md:flex items-center gap-8">
        <a href="/index.html" class="text-gray-600 hover:text-primary transition-colors duration-200 cursor-pointer">Home</a>
        <a href="/index.html#features" class="text-gray-600 hover:text-primary transition-colors duration-200 cursor-pointer">Features</a>
        <a href="/courses.html" class="text-gray-600 hover:text-primary transition-colors duration-200 cursor-pointer">Courses</a>
        <a href="/pricing.html" class="text-gray-600 hover:text-primary transition-colors duration-200 cursor-pointer">Pricing</a>
      </div>
      
      <div class="flex items-center gap-3">
        <span class="text-primary font-semibold">Log in</span>
        <button class="bg-primary hover:bg-primary-dark text-white px-5 py-2.5 rounded-xl font-semibold cursor-pointer transition-colors duration-200 shadow-md hover:shadow-lg">
          Get Started
        </button>
      </div>
    </div>
  </nav>
  
  <!-- Main Content -->
  <main class="flex-1 flex items-center justify-center px-4 pt-32 pb-12">
    <div class="w-full max-w-md">
      <div class="glass-card rounded-3xl p-8 shadow-xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
          <p class="text-gray-600">Sign in to continue your learning journey</p>
        </div>
        
        <!-- Social Login -->
        <div class="space-y-3 mb-6">
          <button class="w-full bg-white/70 hover:bg-white/80 border border-gray-200 py-3 rounded-xl font-medium cursor-pointer transition-all duration-200 hover:shadow-md flex items-center justify-center gap-3">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Continue with Google</span>
          </button>
          
          <button class="w-full bg-white/70 hover:bg-white/80 border border-gray-200 py-3 rounded-xl font-medium cursor-pointer transition-all duration-200 hover:shadow-md flex items-center justify-center gap-3">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.6.113.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            <span>Continue with GitHub</span>
          </button>
        </div>
        
        <!-- Divider -->
        <div class="relative mb-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-white/30"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white/70 text-gray-500">or</span>
          </div>
        </div>
        
        <!-- Login Form -->
        <form class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium mb-2">Email Address</label>
            <div class="relative">
              <i data-lucide="mail" class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
              <input type="email" id="email" name="email" required 
                     class="w-full pl-12 pr-4 py-3 rounded-xl border border-white/30 bg-white/70 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200"
                     placeholder="you@example.com">
            </div>
          </div>
          
          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" class="block text-sm font-medium">Password</label>
              <a href="#" class="text-sm text-primary hover:text-primary-dark transition-colors duration-200 cursor-pointer">Forgot password?</a>
            </div>
            <div class="relative">
              <i data-lucide="lock" class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
              <input type="password" id="password" name="password" required 
                     class="w-full pl-12 pr-12 py-3 rounded-xl border border-white/30 bg-white/70 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200"
                     placeholder="••••••••">
              <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer" aria-label="Toggle password visibility">
                <i data-lucide="eye" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
          
          <div class="flex items-center">
            <input type="checkbox" id="remember" name="remember" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary cursor-pointer">
            <label for="remember" class="ml-2 text-sm text-gray-600 cursor-pointer">Remember me</label>
          </div>
          
          <button type="submit" 
                  class="w-full bg-primary hover:bg-primary-dark text-white py-3.5 rounded-xl font-semibold cursor-pointer transition-colors duration-200 shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
            <span>Sign In</span>
            <i data-lucide="arrow-right" class="w-5 h-5"></i>
          </button>
        </form>
        
        <!-- Sign Up Link -->
        <p class="text-center mt-6 text-gray-600">
          Don't have an account? 
          <a href="/signup.html" class="text-primary hover:text-primary-dark font-medium transition-colors duration-200 cursor-pointer">Sign up for free</a>
        </p>
        
      </div>
    </div>
  </main>
  
  <!-- Footer -->
  <footer class="py-8 px-4 border-t border-white/20">
    <div class="max-w-7xl mx-auto text-center text-sm text-gray-600">
      <p>&copy; 2024 EduFlow. All rights reserved.</p>
      <div class="flex items-center justify-center gap-6 mt-4">
        <a href="#" class="hover:text-primary transition-colors duration-200 cursor-pointer">Privacy</a>
        <a href="#" class="hover:text-primary transition-colors duration-200 cursor-pointer">Terms</a>
        <a href="/contact.html" class="hover:text-primary transition-colors duration-200 cursor-pointer">Contact</a>
      </div>
    </div>
  </footer>
  
  <script>
    // Initialize Lucide icons
    lucide.createIcons();
    
    // Password toggle
    const passwordToggle = document.querySelector('button[aria-label="Toggle password visibility"]');
    const passwordInput = document.getElementById('password');
    
    passwordToggle.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Toggle icon
      const icon = passwordToggle.querySelector('i');
      if (type === 'text') {
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    });
    
    // Form submission
    document.querySelector('form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Login functionality would connect to backend in production.');
    });
  </script>
</body>
</html>
